openapi: 3.0.3
info:
  title: Cryptator API
  version: 1.0.0
  description: Cryptator API is a REST API built on top of the constraint-based cryptarithm solver Cryptsator (https://github.com/arnaud-m/cryptator/).

components:
  parameters:
    BaseParam:
      name: base
      in: query
      description: Numeric base of the positional system
      required: false
      schema:
        type: integer
        default: 10
        minimum: 2
        maximum: 36

  schemas:
    GenerateOptions:
      type: object
      properties:
        min:
          type: integer
          default: 3
          description: Minimum number of words
          minimum: 3
        max:
          type: integer
          default: -1
          description: Maximum number of words (max >= min, or max = -1 unlimited)
        right:
          type: string
          enum: [FREE, UNIQUE, FIXED]
          default: UNIQUE
          description: Right member type
        type:
          type: string
          enum: [ADD, MUL]
          default: ADD
          description: Operation type used by the generator to build cryptarithms
    SearchMeasures:
      type: object
      properties:
        timeCount:
          type: number
          description: Execution time in seconds
          example: 0.03
          minimum:  0
        nodeCount:
          type: integer
          description: Number of tree search nodes
          example: 4
          minimum: 0
    CryptarithmResults:
      type: object
      properties:
        cryptarithms:
          type: array
          description: Array of results, one per cryptarithm
          items:
            allOf:
              - type: object
                properties:
                  equation:
                    type: string
                    description: Cryptarithm equation
                    example: "SEND + MORE = MONEY"
                  solutions:
                    type: array
                    description: List of solutions
                    items:
                      type: object
                      additionalProperties:
                        type: integer
                        minimum: 0
                        maximum: 35
                    example:
                      - S: 9
                        E: 5
                        N: 6
                        D: 7
                        M: 1
                        O: 0
                        R: 8
                        Y: 2
              - $ref: '#/components/schemas/SearchMeasures'
              - firstSolutionNodeCount:
                  type: integer
                  description: Number of search nodes explored to find the first solution
                  example: 6
                  minimum: 0
    GenerateResults:
      type: object
      allOf:
        - $ref: '#/components/schemas/CryptarithmResults'
        - $ref: '#/components/schemas/SearchMeasures'
        - type:  object
          properties:
            candidateCount:
              type: integer
              description: "Number of candidate cryptarithms"
              example: 3
              minimum: 0

paths:
  /solve:
    post:
      summary: Solve cryptarithms
      description: |
        Solves cryptarithms using Cryptator.
        The base is passed as query parameter.
        Cryptarithms with optional domains are passed in the request body.
      parameters:
        - $ref: '#/components/parameters/BaseParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cryptarithms:
                  type: array
                  description: List of cryptarithms to solve, each with optional domains
                  items:
                    type: object
                    properties:
                      equation:
                        type: string
                        description: Cryptarithm equation
                      domains:
                        type: object
                        description: Optional integer domains of letters
                        additionalProperties:
                          type: string
                        pattern: "^\\d+(-\\d+)?(, *\\d+(-\\d+)?)*$"
                    required:
                      - equation
            examples:
              noSoluce:
                summary: NULL = NO + SOLUTION
                value:
                  cryptarithms:
                    - equation: "NULL = NO + SOLUTION"
              sendMoreMoney:
                summary: SEND + MORE = MONEY
                value:
                  cryptarithms:
                    - equation: "SEND + MORE = MONEY"
                      domains:
                        S: "9"
                        E: "1-5"
              planets:
                summary: EARTH + MARS + URANUS = SATURN
                value:
                  cryptarithms:
                    - equation: "EARTH + MARS + URANUS = SATURN"
      responses:
        '200':
          description: Results for each cryptarithm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CryptarithmResults'
              examples:
                noSoluce:
                  summary: Result for NULL = NO + SOLUTION
                  value:
                    cryptarithms:
                      - equation: "NULL = NO + SOLUTION"
                        solutions: []
                        timeCount: 0.08
                        nodeCount: 0
                sendMoreMoney:
                  summary: Result for SEND + MORE = MONEY
                  value:
                    cryptarithms:
                      - equation: "SEND + MORE = MONEY"
                        solutions:
                          - S: 9
                            E: 5
                            N: 6
                            D: 7
                            M: 1
                            O: 0
                            R: 8
                            Y: 2
                        timeCount: 0.03
                        nodeCount: 4
                planets:
                  summary: Results for EARTH + MARS + URANUS = SATURN
                  value:
                    cryptarithms:
                      - equation: "EARTH + MARS + URANUS = SATURN"
                        solutions:
                          - A: 2
                            E: 7
                            H: 3
                            M: 6
                            N: 1
                            R: 4
                            S: 9
                            T: 0
                            U: 8
                          - A: 1
                            E: 7
                            H: 0
                            M: 5
                            N: 6
                            R: 4
                            S: 3
                            T: 8
                            U: 2
                        timeCount: 0.165
                        nodeCount: 21690
        '400':
          description: Invalid request (e.g., missing cryptarithms)
        '500':
          description: Server error

  /generate/words:
    post:
      summary: Generate cryptarithms
      description: Generate cryptarithms from a list of words
      parameters:
        - $ref: '#/components/parameters/BaseParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/GenerateOptions'
                - type: object
                  required: [words]
                  properties:
                    words:
                      type: array
                      items:
                        type: string
                        pattern: "^[^\\s]+$"
                      description: List of words to generate cryptarithms.
                        Each word may contain any characters except spaces.
                      minItems:  3
            examples:
              sendMoreMoney:
                summary: Money
                value:
                  min: 3
                  max: -1
                  right: "UNIQUE"
                  type: "ADD"
                  words: ["SEND", "MORE", "MONEY"]
              planets:
                summary: Planets
                value:
                  min: 4
                  max: 5
                  right: "UNIQUE"
                  type: "ADD"
                  words: ["MERCURY", "VENUS", "EARTH", "MARS", "SATURN", "URANUS"]
              multiplication:
                summary: Multiplication
                value:
                  right: "FREE"
                  type: "MUL"
                  words: ["CAT", "DOG", "COW", "PIG", "FISH"]
              noSoluce:
                summary: No Solution
                value:
                  right: "FREE"
                  type: "ADD"
                  words: ["ONE", "TWO", "THREE"]


      responses:
        '200':
          description: Generated cryptarithms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResults'
              examples:
                sendMoreMoney:
                  summary: Money
                  value:
                    cryptarithms:
                      - equation: "SEND + MORE = MONEY"
                        solutions:
                          - S: 9
                            E: 5
                            N: 6
                            D: 7
                            M: 1
                            O: 0
                            R: 8
                            Y: 2
                        timeCount: 0.03
                        nodeCount: 4
                        firstSolutionNodeCount: 4
                    timeCount: 0.03
                    nodeCount: 4
                    candidateCount: 1
                planets:
                  summary: Planets
                  value:
                    cryptarithms:
                      - equation: "VENUS + EARTH + URANUS = SATURN"
                        solutions:
                          - A: 2
                            E: 7
                            H: 4
                            N: 0
                            R: 5
                            S: 8
                            T: 1
                            U: 6
                            V: 9
                        timeCount: 0.153
                        nodeCount: 3244
                      - equation: "MARS + SATURN + URANUS = MERCURY"
                        solutions:
                          - A: 9
                            C: 6
                            E: 2
                            M: 1
                            N: 0
                            R: 3
                            S: 4
                            T: 5
                            U: 7
                            Y: 8
                        timeCount: 0.043
                        nodeCount: 408
                    timeCount: 0.544
                    nodeCount: 24
                    candidateCount: 12
                multiplication:
                  summary: Multiplication
                  value:
                    cryptarithms:
                      - equation: "PIG * FISH = DOG * COW"
                        solution:
                          - C: 4
                            D: 6
                            F: 2
                            G: 5
                            H: 0
                            I: 3
                            O: 7
                            P: 1
                            S: 9
                            W: 8
                        timeCount: 0.189
                        nodeCount: 5486
                      - equation: "COW * FISH = DOG * PIG"
                        solution:
                          - C: 1
                            D: 4
                            F: 2
                            G: 9
                            H: 7
                            I: 6
                            O: 5
                            P: 8
                            S: 0
                            W: 3
                        timeCount: 0.188
                        nodeCount: 4700
                    timeCount: 0.405
                    nodeCount: 48
                    candidateCount: 6
                noSoluce:
                  summary: No Solution
                  value:
                    cryptarithms: []
                    timeCount: 0.010
                    nodeCount: 0
                    candidateCount: 0
        '400':
          description: Invalid request
        '500':
          description: Server error

  /generate/numbers:
    post:
      summary: Generate doubly true cryptarithms
      description: Generate doubly true cryptarithms with written-out numbers
      parameters:
        - $ref: '#/components/parameters/BaseParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/GenerateOptions'
                - type: object
                  properties:
                    ctry:
                      type: string
                      description: Country code for written-out numbers
                      example: "EN"
                      minLength:  2
                      maxLength: 2
                    lang:
                      type: string
                      description: Language code for written-out number
                      example: "en"
                      minLength:  2
                      maxLength: 2
                    minsum:
                      type: integer
                      description: Minimum sum for doubly true cryptarithms
                      example: 1
                      minimum: 1
                    maxsum:
                      type: integer
                      description: Maximum sum for doubly true cryptarithms (maxsum >= minsum)
                      example: 50
                      minimum: 1
      responses:
        '200':
          description: Generated doubly true cryptarithms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResults'
        '400':
          description: Invalid request
        '500':
          description: Server error